<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaden Jirasevijinda</title>
  <meta name="description" content="Jaden Jirasevijinda — Student, creator, builder. President of GEA, Board Member at Pillars of Tech." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── PAGE-SPECIFIC STYLES ── */

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: calc(var(--nav-h) + 60px) 24px 100px;
      position: relative; overflow: hidden;
    }
    .hero-canvas { position: absolute; inset: 0; pointer-events: none; }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 45%, black 30%, transparent 100%);
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(100px);
      opacity: 0; animation: orbFadeIn 1.8s ease forwards;
    }
    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(41,151,255,0.2), transparent 65%);
      top: -200px; left: 50%; transform: translateX(-50%);
      animation-delay: 0.2s;
    }
    .orb-2 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(191,90,242,0.15), transparent 65%);
      bottom: -50px; right: -80px; animation-delay: 0.5s;
    }
    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(48,209,88,0.12), transparent 65%);
      bottom: 100px; left: -60px; animation-delay: 0.7s;
    }
    @keyframes orbFadeIn { to { opacity: 1; } }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 980px; padding: 6px 16px;
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 36px;
      animation: fadeUpIn 0.7s 0.3s ease both;
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
      animation: blinkDot 2.5s ease-in-out infinite;
    }
    @keyframes blinkDot { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .hero-name {
      display: block;
      animation: fadeUpIn 0.7s 0.45s ease both;
    }
    .hero-name-line2 {
      display: block;
      animation: fadeUpIn 0.7s 0.55s ease both;
    }

    .hero-sub {
      margin-bottom: 18px; max-width: 530px;
      animation: fadeUpIn 0.7s 0.65s ease both;
    }

    .hero-chips {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; flex-wrap: wrap;
      margin-bottom: 52px;
      animation: fadeUpIn 0.7s 0.75s ease both;
    }
    .chip {
      font-size: 12.5px; padding: 5px 13px; border-radius: 980px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.03);
      color: var(--text-dim); font-weight: 400;
    }
    .chip-accent  { color: var(--accent);        border-color: rgba(41,151,255,0.3);  background: rgba(41,151,255,0.07);  }
    .chip-green   { color: var(--accent-green);   border-color: rgba(48,209,88,0.3);   background: rgba(48,209,88,0.07);   }
    .chip-purple  { color: var(--accent-purple);  border-color: rgba(191,90,242,0.3);  background: rgba(191,90,242,0.07);  }

    .hero-btns {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      animation: fadeUpIn 0.7s 0.85s ease both;
    }

    .hero-scroll-hint {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--text-dim); font-size: 10.5px; letter-spacing: 0.14em;
      text-transform: uppercase;
      animation: fadeUpIn 1s 1.4s ease both;
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--text-dim), transparent);
      animation: scrollPulse 2.2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 0; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }
    @keyframes fadeUpIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* STATS */
    .stats-band {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      divide-x: 1px solid var(--border);
    }
    .stat-cell {
      padding: 40px 44px;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }
    .stat-num {
      font-size: 52px; font-weight: 800;
      letter-spacing: -0.05em; line-height: 1;
      margin-bottom: 6px;
    }
    .stat-lbl { font-size: 13.5px; color: var(--text-muted); }

    /* BENTO ABOUT */
    .bento {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .bc { /* bento cell */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.35s var(--ease);
    }
    .bc:hover { border-color: var(--border-md); transform: translateY(-3px); }

    .bc-bio    { grid-column: span 2; grid-row: span 2; }
    .bc-role   { grid-column: span 1; }
    .bc-photo  { grid-column: span 2; }
    .bc-loc    { grid-column: span 1; }
    .bc-quote  { grid-column: span 3; }

    .bc-icon { font-size: 38px; display: block; margin-bottom: 14px; }
    .bc-micro { font-size: 10.5px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; }
    .bc-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 14px; }
    .bc-body  { font-size: 14.5px; color: var(--text-muted); line-height: 1.7; }
    .bc-org   { font-size: 13px; color: var(--accent); margin-bottom: 8px; }

    .photo-thumb {
      aspect-ratio: 16/7;
      border-radius: var(--r-sm);
      background: linear-gradient(135deg, #0a192f 0%, #112240 50%, #1a3a5c 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 60px; overflow: hidden;
    }
    .photo-caption { margin-top: 12px; font-size: 12.5px; color: var(--text-dim); }

    .loc-row { display: flex; align-items: center; gap: 9px; }
    .loc-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green);
    }

    .quote-text {
      font-size: clamp(16px, 2vw, 22px); font-weight: 600;
      letter-spacing: -0.02em; line-height: 1.4;
      color: var(--text-muted);
    }
    .quote-text span { color: var(--text); }

    .skills-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }

    /* INTERESTS */
    .interests-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .interest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 32px 26px; display: flex; flex-direction: column; gap: 12px;
    }
    .interest-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }

    /* RESPONSIVE */
    @media (max-width: 960px) {
      .bento { grid-template-columns: 1fr 1fr; }
      .bc-bio { grid-column: span 2; }
      .bc-photo { grid-column: span 2; }
      .bc-quote { grid-column: span 2; }
      .stats-grid { grid-template-columns: 1fr; }
      .stat-cell { border-right: none; border-bottom: 1px solid var(--border); }
      .stat-cell:last-child { border-bottom: none; }
      .interests-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .bento { grid-template-columns: 1fr; }
      .bc-bio, .bc-role, .bc-photo, .bc-loc, .bc-quote { grid-column: span 1; }
      .interests-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav id="site-nav"></nav>

  <!-- ── HERO ──────────────────────────────────────────────────── -->
  <section class="hero" id="hero">
    <div class="hero-canvas">
      <div class="hero-grid"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <span class="hero-badge">
      <span class="badge-dot"></span>
      <span id="hero-available-text"></span>
    </span>

    <h1 class="display-xl" style="margin-bottom:28px">
      <span class="hero-name grad-light" id="hero-name"></span>
      <span class="hero-name-line2 grad-accent" id="hero-tagline-word"></span>
    </h1>

    <p class="body-lg muted hero-sub" id="hero-sub"></p>

    <div class="hero-chips" id="hero-chips"></div>

    <div class="hero-btns">
      <a href="projects.html" class="btn btn-primary">See my work</a>
      <a href="contact.html"  class="btn btn-ghost">Get in touch</a>
    </div>

    <div class="hero-scroll-hint">
      <span>Scroll</span>
      <span class="scroll-line"></span>
    </div>
  </section>

  <!-- ── STATS ─────────────────────────────────────────────────── -->
  <div class="stats-band">
    <div class="container">
      <div class="stats-grid" id="stats-grid"></div>
    </div>
  </div>

  <!-- ── ABOUT BENTO ───────────────────────────────────────────── -->
  <section class="section" id="about">
    <div class="container">
      <div class="section-header animate">
        <span class="label">About me</span>
        <h2 class="display-lg">Passionate about tech,<br/>community <span class="grad-accent">&amp; creativity.</span></h2>
      </div>
      <div class="bento" id="bento-grid"></div>
    </div>
  </section>

  <!-- ── INTERESTS ─────────────────────────────────────────────── -->
  <section class="section" id="interests" style="background: var(--surface); border-top: 1px solid var(--border)">
    <div class="container">
      <div class="section-header animate">
        <span class="label">What I do</span>
        <h2 class="display-lg">Creative &amp; Technical<br/><span class="grad-accent">Interests</span></h2>
        <p class="body-lg">I love working at the intersection of art and technology.</p>
      </div>
      <div class="interests-grid" id="interests-grid"></div>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <script src="content.js"></script>
  <script src="components.js"></script>
  <script>
    // ── Hero parallax on mouse ──────────────────────────────────
    document.addEventListener('mousemove', e => {
      const cx = (e.clientX / window.innerWidth  - 0.5) * 22;
      const cy = (e.clientY / window.innerHeight - 0.5) * 22;
      const o1 = document.querySelector('.orb-1');
      const o2 = document.querySelector('.orb-2');
      const o3 = document.querySelector('.orb-3');
      if (o1) o1.style.transform = `translateX(calc(-50% + ${cx*0.4}px)) translateY(${cy*0.4}px)`;
      if (o2) o2.style.transform = `translateX(${cx*-0.6}px) translateY(${cy*-0.6}px)`;
      if (o3) o3.style.transform = `translateX(${cx*0.7}px) translateY(${cy*0.7}px)`;
    });

    // ── Render from SITE content ────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const S = window.SITE;
      if (!S) return;

      // Hero
      document.getElementById('hero-available-text').textContent = S.availableText;
      document.getElementById('hero-name').textContent = S.nameShort;
      document.getElementById('hero-tagline-word').textContent = "builds things.";
      document.getElementById('hero-sub').textContent = S.tagline + " " + "I make things with cameras, code, and a whole lot of curiosity.";

      // Chips
      const chipStyles = { accent:'chip-accent', green:'chip-green', purple:'chip-purple', dim:'' };
      document.getElementById('hero-chips').innerHTML = S.roles.map(r =>
        `<span class="chip ${chipStyles[r.style]||''}">${r.text}</span>`
      ).join('');

      // Stats
      const statColors = { accent:'var(--accent)', green:'var(--accent-green)', purple:'var(--accent-purple)' };
      document.getElementById('stats-grid').innerHTML = S.stats.map(s =>
        `<div class="stat-cell animate">
           <div class="stat-num" style="color:${statColors[s.color]||'var(--text)'}">${s.value}</div>
           <div class="stat-lbl">${s.label}</div>
         </div>`
      ).join('');

      // Bento
      const expCards = S.experience.map(e =>
        `<div class="bc bc-role animate">
           <span class="bc-icon">${e.icon}</span>
           <div class="bc-micro">Role</div>
           <div class="bc-title">${e.role}</div>
           <div class="bc-org">${e.org}</div>
           <div class="bc-body">${e.desc}</div>
         </div>`
      ).join('');

      const skillPills = S.skills.map(s => `<span class="pill">${s}</span>`).join('');

      document.getElementById('bento-grid').innerHTML = `
        <div class="bc bc-bio animate">
          <div class="bc-micro">About</div>
          <div class="bc-title">Builder, creator,<br/>community leader.</div>
          <div class="bc-body">${S.bio}</div>
          <div class="bc-body" style="margin-top:12px">${S.bioExtra}</div>
          <div class="skills-row">${skillPills}</div>
        </div>
        ${expCards}
        <div class="bc bc-photo animate">
          <div class="bc-micro">Visual Storytelling</div>
          <div class="photo-thumb">
            ${S.headshot
              ? `<img src="${S.headshot}" alt="${S.nameShort}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r-sm)" />`
              : (S.photos && S.photos.find(p => p.src && p.featured))
                ? `<img src="${S.photos.find(p => p.src && p.featured).src}" alt="Photography" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r-sm)" />`
                : `<span style="font-size:60px">📸</span>`
            }
          </div>
          <div class="photo-caption" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
            <span>Photography · Videography · Drone · Editing</span>
            <a href="photos.html" style="font-size:12px;color:var(--accent);text-decoration:none;white-space:nowrap">View gallery →</a>
          </div>
        </div>
        <div class="bc bc-loc animate">
          <div class="bc-micro">Based in</div>
          <div class="loc-row">
            <span class="loc-dot"></span>
            <span style="font-weight:500">${S.location}</span>
          </div>
          <div class="bc-body" style="margin-top:10px;font-size:13px">${S.school}</div>
        </div>
        <div class="bc bc-quote animate">
          <div class="quote-text">
            "<span>${S.quote.split(' ').slice(0,8).join(' ')}</span> ${S.quote.split(' ').slice(8).join(' ')}"
          </div>
        </div>
      `;

      // Interests
      document.getElementById('interests-grid').innerHTML = S.interests.map(i =>
        `<div class="interest-card card animate">
           <div class="interest-icon" style="background:${i.color}">${i.icon}</div>
           <div class="display-sm">${i.name}</div>
           <div class="body-sm muted">${i.desc}</div>
         </div>`
      ).join('');

      // Re-observe new elements
      document.querySelectorAll('.animate:not([data-delay])').forEach((el, idx) => {
        el.dataset.delay = (idx % 4) * 80;
      });
    });
  </script>
</body>
</html>
