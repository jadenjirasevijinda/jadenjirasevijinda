<script src="content.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof SITE_DATA !== 'undefined') {
            // Update Text
            document.body.innerHTML = document.body.innerHTML
                .replace('JADEN', SITE_DATA.identity.firstName)
                .replace('JIRASEVIJINDA', SITE_DATA.identity.lastName)
                .replace('BUILDING SYSTEMS.', SITE_DATA.identity.heroAccent);
            
            // Update Bio
            document.querySelector('.hero-description').innerText = SITE_DATA.identity.statusBio;

            // Update Stats (Targeting by order)
            const statValues = document.querySelectorAll('.stat-number'); // Ensure your numbers have this class
            const statLabels = document.querySelectorAll('.stat-label');  // Ensure your labels have this class
            SITE_DATA.stats.forEach((s, i) => {
                if(statValues[i]) statValues[i].innerText = s.v;
                if(statLabels[i]) statLabels[i].innerText = s.l;
            });

            // Update Theme
            document.documentElement.style.setProperty('--accent', SITE_DATA.theme.accent);
            document.documentElement.style.setProperty('--left-gutter', SITE_DATA.theme.gutter);
            document.querySelector('.system-status-text').innerText = SITE_DATA.theme.systemStatus;
        }
    });
</script>
