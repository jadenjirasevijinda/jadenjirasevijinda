<head>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --accent: #ff5d22; --border: #222224; --nav-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #e1e1e3; font-family: 'Space Grotesk', sans-serif; padding-top: var(--nav-h); overflow-x: hidden; }

        /* Vercel-Style Scanline Effect */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        nav {
            position: fixed; top: 0; width: 100%; height: var(--nav-h);
            background: rgba(10,10,11,0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 13px; color: var(--accent); text-transform: uppercase; }
        .nav-links a { font-family: 'JetBrains Mono'; color: #666; text-decoration: none; font-size: 11px; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        section { padding: 100px 40px; border-bottom: 1px solid var(--border); animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero-title { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800; text-transform: uppercase; line-height: 0.9; }
        .label { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 11px; margin-bottom: 15px; display: block; }
    </style>
</head>
