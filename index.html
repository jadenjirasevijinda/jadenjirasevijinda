<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JADEN J. // TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --accent: #ff5d22; --border: #222224; --nav-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: #e1e1e3; font-family: 'Space Grotesk', sans-serif; 
            padding-top: var(--nav-h); overflow-x: hidden; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* REACTIVE MOUSE GRID */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--border) 1px, transparent 0);
            background-size: 40px 40px; z-index: -1;
        }
        .spotlight {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(600px circle at var(--x) var(--y), rgba(255,93,34,0.07), transparent 40%);
            z-index: -1; pointer-events: none;
        }

        /* NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; height: var(--nav-h);
            background: rgba(10,10,11,0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 13px; color: var(--accent); }
        .nav-links a { font-family: 'JetBrains Mono'; color: #666; text-decoration: none; font-size: 11px; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        /* HERO */
        section { padding: 120px 40px; flex-grow: 1; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 800; text-transform: uppercase; line-height: 0.85; letter-spacing: -2px; }
        .label { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 11px; margin-bottom: 15px; display: block; }

        /* FOOTER */
        .sys-footer { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 25px 40px; border-top: 1px solid var(--border); font-family: 'JetBrains Mono'; background: #000; }
        .f-label { color: #444; font-size: 9px; }
        .f-data { color: var(--accent); font-size: 10px; margin-left: 8px; }
    </style>
</head>
<body onmousemove="document.documentElement.style.setProperty('--x', event.clientX + 'px'); document.documentElement.style.setProperty('--y', event.clientY + 'px')">

<div class="grid-overlay"></div>
<div class="spotlight"></div>

<nav>
    <div class="nav-logo">JADEN_JIRASEVIJINDA.SYS</div>
    <div class="nav-links">
        <a href="index.html" class="active">01_HOME</a>
        <a href="about.html">02_ABOUT</a>
        <a href="projects.html">03_WORKS</a>
        <a href="photos.html">04_GALLERY</a>
        <a href="contact.html">05_CONNECT</a>
    </div>
</nav>

<section>
    <span class="label">[ STATUS: ONLINE ]</span>
    <h1 class="hero-title">JADEN <br><span style="color:var(--accent)">JIRASEVIJINDA.</span></h1>
    <h2 class="hero-title" style="color:#222">BUILDING STUFF & <br>SOLVING PROBLEMS.</h2>
</section>

<footer class="sys-footer">
    <div><span class="f-label">LOC //</span><span class="f-data">LIVERMORE_CA [37.68° N]</span></div>
    <div style="text-align: center;"><span class="f-label">SYS_TIME //</span><span id="clock" class="f-data">00:00:00</span></div>
    <div style="text-align: right;"><span class="f-label">VER //</span><span class="f-data">4.2.0_STABLE</span></div>
</footer>

<script>
    function tick() {
        const now = new Date();
        document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
    }
    setInterval(tick, 1000); tick();
</script>
</body>
</html>
