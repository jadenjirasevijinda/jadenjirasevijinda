<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS // JADEN_J</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --accent: #ff5d22; --border: #222224; --nav-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--bg); color: #e1e1e3; font-family: 'Space Grotesk', sans-serif; padding-top: var(--nav-h); }

        /* CRT SCANLINE EFFECT */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* TOP NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; height: var(--nav-h);
            background: rgba(10,10,11,0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 13px; color: var(--accent); }
        .nav-links a { font-family: 'JetBrains Mono'; color: #666; text-decoration: none; font-size: 11px; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        /* HEADER */
        .header { padding: 80px 40px; border-bottom: 1px solid var(--border); }
        .label { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 11px; margin-bottom: 15px; display: block; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
        .card { 
            background: var(--bg); padding: 50px 40px; height: 380px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            text-decoration: none; color: #fff; transition: 0.4s; position: relative; overflow: hidden;
        }
        .card:hover { background: #0e0e10; }
        .card::after { 
            content: "OPEN_FILE"; position: absolute; bottom: -20px; right: 20px; 
            font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); opacity: 0; transition: 0.3s;
        }
        .card:hover::after { bottom: 20px; opacity: 1; }
        .card h3 { font-size: 2.2rem; text-transform: uppercase; line-height: 1; }
        .card:hover h3 { color: var(--accent); }
    </style>
</head>

</body>
</html>
