<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JADEN JIRASEVIJINDA // HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { --bg: #0a0a0b; --accent: #ff5d22; --left-gutter: 200px; }
        body { background: var(--bg); color: #e1e1e3; font-family: 'Space Grotesk'; margin: 0; padding-left: var(--left-gutter); }
        section { padding: 100px 60px; border-bottom: 1px solid #222; }
        .display-xl { font-size: 5rem; font-weight: 800; line-height: 0.9; text-transform: uppercase; margin: 0; }
        .section-label { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 12px; margin-bottom: 20px; display: block; }
        .stats-container { display: flex; border-bottom: 1px solid #222; }
        .stat-item { flex: 1; padding: 40px; border-right: 1px solid #222; }
        .stat-number { font-size: 3rem; font-weight: 700; display: block; }
        .tech-tag { display: inline-block; padding: 8px 16px; border: 1px solid #222; margin: 5px; font-family: 'JetBrains Mono'; font-size: 11px; }
    </style>
</head>
<body>
    <section>
        <div class="section-label">[ SYSTEM_INITIALIZED ]</div>
        <h1 class="display-xl" id="hero-name"></h1>
        <h2 class="display-xl" style="color:var(--accent)" id="hero-accent"></h2>
        <p id="hero-desc" style="max-width:600px; color:#888; font-size:1.2rem; margin-top:30px;"></p>
    </section>

    <div class="stats-container" id="stats-band"></div>

    <section>
        <div class="section-label">[ DATA_FILE_01 ]</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:60px;">
            <h3 style="font-size: 2.5rem; margin:0;">ABOUT THE <span style="color:var(--accent)">BUILDER</span></h3>
            <p id="about-bio" style="color:#aaa; line-height:1.6; font-size:1.1rem;"></p>
        </div>
    </section>

    <section id="tech-section">
        <div class="section-label">[ CORE_COMPETENCIES ]</div>
        <div id="tech-stack"></div>
    </section>

    <script src="content.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const d = SITE_DATA.index;
            document.getElementById('hero-name').innerHTML = `${d.firstName} <span style="color:var(--accent)">${d.lastName}</span>`;
            document.getElementById('hero-accent').innerText = d.heroAccent;
            document.getElementById('hero-desc').innerText = d.description;
            document.getElementById('about-bio').innerText = d.aboutLong;
            
            // Render Stats
            d.stats.forEach(s => {
                document.getElementById('stats-band').innerHTML += `
                    <div class="stat-item"><span class="stat-number">${s.val}</span><span style="font-family:'JetBrains Mono'; font-size:10px; color:#666;">${s.label}</span></div>`;
            });

            // Render Tech
            d.techStack.forEach(t => {
                document.getElementById('tech-stack').innerHTML += `<span class="tech-tag">${t}</span>`;
            });
        });
    </script>
</body>
</html>
