<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JADEN J. // TECHNICAL PORTFOLIO</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <nav id="site-nav"></nav>

  <section class="hero" id="hero">
    <div class="container">
      <div class="hero-badge">
        SYSTEM_STATUS: OPEN_FOR_COLLAB
      </div>

      <h1 class="display-xl">
        JADEN <span style="color:var(--text-dim)">JIRASEVIJINDA</span><br/>
        <span style="color:var(--accent)">BUILDING SYSTEMS.</span>
      </h1>

      <p class="body-lg muted hero-sub" style="max-width: 600px; margin: 30px 0;">
        Engineering-focused creator building at the intersection of <span class="mono" style="color:var(--text)">Code</span>, <span class="mono" style="color:var(--text)">Media</span>, and <span class="mono" style="color:var(--text)">Community</span>.
      </p>

      <div class="hero-btns">
        <a href="./projects.html" class="btn btn-primary">Initialize View (Projects)</a>
        <a href="./contact.html"  class="btn">Get In Touch</a>
      </div>
    </div>
  </section>

  <div class="stats-band" style="background: var(--panel); border-bottom: 1px solid var(--border);">
    <div class="container">
      <div class="stats-grid" id="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
        </div>
    </div>
  </div>

  <section class="section" id="about">
    <div class="container">
      <div class="section-header" style="margin-bottom: 60px;">
        <span class="mono" style="color: var(--accent);">[ DATA_FILE_01 ]</span>
        <h2 class="display-lg" style="margin-top: 10px;">ABOUT THE <span style="color: var(--accent);">BUILDER</span></h2>
      </div>
      
      <div class="bento" id="bento-grid">
        </div>
    </div>
  </section>

  <footer id="site-footer"></footer>

  <script src="./content.js"></script>
  <script src="./components.js"></script>
  
  <script>
    // Industrial Theme Data Render Override
    window.addEventListener('DOMContentLoaded', () => {
      // You can keep your existing renderFromSite logic, 
      // but ensure it targets these new industrial class names.
      const stats = [
        { value: "12", label: "ACTIVE_PROJECTS" },
        { value: "04", label: "YEARS_EXPERIENCE" },
        { value: "01", label: "GEA_PRESIDENCY" }
      ];
      
      document.getElementById('stats-grid').innerHTML = stats.map(s => `
        <div style="padding: 30px; border-right: 1px solid var(--border);">
          <div class="mono" style="color:var(--accent); font-size: 32px;">${s.value}</div>
          <div class="mono" style="color:var(--text-dim)">${s.label}</div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
