<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECTS // JADEN_J</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <style>
        :root {
            --bg: #0a0a0b;
            --panel: #111113;
            --border: #222224;
            --text: #e1e1e3;
            --accent: #ff5d22;
            --left-gutter: 200px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding-left: var(--left-gutter);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 60px;
        }

        .project-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 30px;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .project-category {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .project-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* MODAL STYLES */
        #project-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            max-width: 700px;
            width: 90%;
            padding: 60px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            color: var(--accent);
            font-family: 'JetBrains Mono';
            cursor: pointer;
            border: 1px solid var(--accent);
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <header style="padding: 60px;">
        <div style="font-family: 'JetBrains Mono'; color: var(--accent); margin-bottom: 10px;">[ DATA_FILE_02 ]</div>
        <h1 style="font-size: 48px; text-transform: uppercase;">Selected <span style="color: var(--accent)">Works</span></h1>
    </header>

    <div class="project-grid" id="project-container">
        </div>

    <div id="project-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeModal()">CLOSE [X]</div>
            <div id="modal-category" class="project-category"></div>
            <h2 id="modal-title" class="project-title" style="font-size: 32px;"></h2>
            <div id="modal-body" style="line-height: 1.8; color: #aaa; font-size: 18px;"></div>
        </div>
    </div>

    <script src="content.js"></script> <script>
        // 1. Render Projects from SITE_DATA
        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = '';

            SITE_DATA.projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => openModal(project);
                
                card.innerHTML = `
                    <div class="project-category">${project.category}</div>
                    <div class="project-title">${project.title}</div>
                    <div style="font-family: 'JetBrains Mono'; font-size: 11px; color: #666;">VIEW_DETAILS +</div>
                `;
                container.appendChild(card);
            });
        }

        // 2. Modal Functions
        function openModal(project) {
            document.getElementById('modal-title').innerText = project.title;
            document.getElementById('modal-category').innerText = project.category;
            document.getElementById('modal-body').innerText = project.details;
            document.getElementById('project-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('project-modal').style.display = 'none';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderProjects);
    </script>
</body>
</html>
