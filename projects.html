<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>PROJECTS // JADEN_J</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --accent: #ff5d22; --left-gutter: 200px; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk'; padding-left: var(--left-gutter); margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 60px; }
        .card { background: #111; border: 1px solid #222; padding: 30px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 60px; border: 1px solid #222; max-width: 600px; position: relative; }
    </style>
</head>
<body>
    <header style="padding: 60px 60px 0 60px;">
        <div style="font-family:'JetBrains Mono'; color:var(--accent); font-size:12px;">[ DATA_FILE_02 ]</div>
        <h1 style="font-size: 3rem; text-transform: uppercase;">Selected <span style="color:var(--accent)">Works</span></h1>
    </header>

    <div class="grid" id="project-grid"></div>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-title" style="color:var(--accent)"></h2>
            <p id="m-details" style="color:#aaa; line-height:1.6;"></p>
            <button onclick="document.getElementById('modal').style.display='none'" style="background:var(--accent); border:none; padding:10px 20px; font-family:'JetBrains Mono'; cursor:pointer;">CLOSE [X]</button>
        </div>
    </div>

    <script src="content.js"></script>
    <script>
        const grid = document.getElementById('project-grid');
        SITE_DATA.projects.forEach(p => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div style="font-family:'JetBrains Mono'; color:var(--accent); font-size:10px;">${p.category}</div><h3>${p.title}</h3><p style="color:#666; font-size:12px;">VIEW DETAILS +</p>`;
            div.onclick = () => {
                document.getElementById('m-title').innerText = p.title;
                document.getElementById('m-details').innerText = p.details;
                document.getElementById('modal').style.display = 'flex';
            };
            grid.appendChild(div);
        });
    </script>
</body>
</html>
