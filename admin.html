<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL // AUTO_DEPLOY</title>
    <style>
        /* ... (Same styles as before) ... */
        .github-card { border: 1px solid #444; background: #1a1a1c; padding: 20px; margin-bottom: 20px; }
        .token-input { font-family: monospace; font-size: 10px; background: #000; color: #30d158; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="main">
        <header class="top-nav">
            <div style="font-family: 'JetBrains Mono'; font-size: 12px;">STATUS: CONNECTED // CLOUD_SYNC</div>
            <button class="btn" id="deploy-btn" onclick="deployToGitHub()">Deploy to GitHub</button>
        </header>

        <main class="content-area">
            <div class="card github-card">
                <span class="card-label">// GITHUB_AUTHENTICATION</span>
                <div class="field">
                    <label class="label">Personal Access Token (Classic)</label>
                    <input type="password" id="gh-token" class="token-input" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div class="row">
                    <div class="field"><label class="label">Repo Name</label><input type="text" id="gh-repo" placeholder="username/repo-name"></div>
                    <div class="field"><label class="label">Branch</label><input type="text" id="gh-branch" value="main"></div>
                </div>
            </div>

            <div class="card">
                <span class="card-label">// IDENTITY_DATA</span>
                <div class="field">
                    <label class="label">Full Name</label>
                    <input type="text" id="f-name" value="Jaden Jirasevijinda">
                </div>
                <div class="field">
                    <label class="label">Status</label>
                    <input type="text" id="f-status" value="Livermore High School Junior | GEA President">
                </div>
            </div>
        </main>
    </div>

    <script>
        async function deployToGitHub() {
            const btn = document.getElementById('deploy-btn');
            const token = document.getElementById('gh-token').value;
            const repo = document.getElementById('gh-repo').value;
            const branch = document.getElementById('gh-branch').value;
            const path = 'content.js'; // The file we are updating

            if (!token || !repo) return alert("Missing GitHub Credentials");

            btn.innerText = "PUSHING_DATA...";
            btn.style.opacity = "0.5";

            // 1. Construct the new file content
            const contentObject = {
                name: document.getElementById('f-name').value,
                status: document.getElementById('f-status').value,
                lastUpdated: new Date().toLocaleString()
            };
            
            const fileContent = `const SITE_DATA = ${JSON.stringify(contentObject, null, 4)};`;
            const encodedContent = btoa(fileContent);

            try {
                // 2. Get the current file SHA (GitHub needs this to overwrite)
                const getUrl = `https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`;
                const getRes = await fetch(getUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const getData = await getRes.json();
                const sha = getData.sha;

                // 3. Push the update
                const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: `Update site content via Admin Terminal`,
                        content: encodedContent,
                        sha: sha,
                        branch: branch
                    })
                });

                if (putRes.ok) {
                    alert("DEPLOY_SUCCESSFUL: Site will update in ~60 seconds.");
                } else {
                    alert("DEPLOY_FAILED: Check your token permissions.");
                }
            } catch (err) {
                console.error(err);
                alert("CONNECTION_ERROR: Check console.");
            } finally {
                btn.innerText = "Deploy to GitHub";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
