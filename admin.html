<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>TERMINAL // OMNI_ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --panel: #111113; --border: #222224; --text: #e1e1e3; --accent: #ff5d22; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; display: flex; margin: 0; }
        .sidebar { width: 260px; height: 100vh; border-right: 1px solid var(--border); padding: 40px 20px; position: fixed; }
        .main { margin-left: 260px; flex: 1; padding: 40px 60px 40px 200px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; margin-bottom: 20px; border-radius: 4px; }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); padding: 10px; color: #fff; font-family: 'JetBrains Mono'; margin: 10px 0; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px 20px; cursor: pointer; font-family: 'JetBrains Mono'; font-weight: 700; font-size: 11px; }
        .tab-btn { color: #666; background: none; border: none; font-family: 'JetBrains Mono'; display: block; padding: 10px 0; cursor: pointer; text-align: left; width: 100%; }
        .tab-btn.active { color: var(--accent); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="color:var(--accent); font-weight:700; margin-bottom:40px;">TERMINAL_v3.0</div>
        <button class="tab-btn active" onclick="showTab('home')">01_HOME_PAGE</button>
        <button class="tab-btn" onclick="showTab('projects')">02_PROJECTS_LIST</button>
        <button class="tab-btn" onclick="showTab('photos')">03_GALLERY</button>
    </div>
    <div class="main">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div id="path-display" style="font-family:'JetBrains Mono'; font-size:11px;">ROOT / CONFIG / HOME</div>
            <button class="btn" onclick="deploy()">DEPLOY TO GITHUB</button>
        </div>
        
        <div class="card" style="border-style: dashed; border-color: #444;">
            <div style="font-family:'JetBrains Mono'; color:var(--accent); font-size:10px; margin-bottom:10px;">// GITHUB_AUTH</div>
            <input type="password" id="gh-token" placeholder="Token (ghp_...)">
            <input type="text" id="gh-repo" placeholder="username/repo-name">
        </div>

        <div id="home-tab" class="tab-content">
            <div class="card">
                <div style="font-family:'JetBrains Mono'; color:var(--accent); font-size:10px;">// HERO_SETTINGS</div>
                <input type="text" id="h-first" placeholder="First Name" value="JADEN">
                <input type="text" id="h-last" placeholder="Last Name" value="JIRASEVIJINDA">
                <textarea id="h-desc" placeholder="Bio Description"></textarea>
            </div>
        </div>

        <div id="projects-tab" class="tab-content" style="display:none;">
            <div class="card">
                <div style="font-family:'JetBrains Mono'; color:var(--accent); font-size:10px;">// PROJECT_01</div>
                <input type="text" id="p1-title" placeholder="Project Title">
                <textarea id="p1-details" placeholder="Full Project Details (will show in popup)"></textarea>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(id + '-tab').style.display = 'block';
            document.getElementById('path-display').innerText = `ROOT / CONFIG / ${id.toUpperCase()}`;
        }

        async function deploy() {
            // Logic to fetch SHA, JSON.stringify all inputs, and PUT to GitHub API
            // (Same as previous script but gathering all tab data)
            alert("Compiling site data and pushing to content.js...");
        }
    </script>
</body>
</html>
