<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY // JADEN_J</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --accent: #ff5d22; --border: #222224; --nav-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk'; padding-top: var(--nav-h); }
        
        /* CRT SCANLINE EFFECT */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        nav { position: fixed; top: 0; width: 100%; height: var(--nav-h); background: rgba(10,10,11,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000; }
        .nav-logo { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 13px; font-weight: 700; }
        .nav-links a { font-family: 'JetBrains Mono'; color: #666; text-decoration: none; font-size: 11px; margin-left: 25px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        
        .header { padding: 60px 40px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 10px; padding: 0 40px 40px; }
        
        .photo-item { 
            width: 100%; aspect-ratio: 16/9; background: #111; border: 1px solid var(--border); 
            overflow: hidden; position: relative; cursor: crosshair; 
        }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); filter: saturate(0); }
        .photo-item:hover img { opacity: 1; transform: scale(1.05); filter: saturate(1); }
        
        .photo-label { 
            position: absolute; bottom: 15px; left: 15px; font-family: 'JetBrains Mono'; 
            font-size: 9px; color: var(--accent); background: #000; padding: 4px 8px; border: 1px solid var(--border);
            opacity: 0; transform: translateY(10px); transition: 0.3s;
        }
        .photo-item:hover .photo-label { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">JADEN_JIRASEVIJINDA.SYS</div>
    <div class="nav-links">
        <a href="index.html">01_HOME</a>
        <a href="about.html">02_ABOUT</a>
        <a href="projects.html">03_WORKS</a>
        <a href="photos.html" class="active">04_GALLERY</a>
        <a href="contact.html">05_CONNECT</a>
    </div>
</nav>

<div class="header">
    <span style="font-family:'JetBrains Mono'; color:var(--accent); font-size:11px;">[ FILE_04: MEDIA_GALLERY ]</span>
    <h1 style="font-size: 3.5rem; text-transform: uppercase; margin-top: 10px;">Visual <span style="color:var(--accent)">Capture.</span></h1>
</div>

<div class="photo-grid">
    <div class="photo-item">
        <img src="shot1.jpg" alt="Gallery Image">
        <div class="photo-label">IMG_REF_001</div>
    </div>
    <div class="photo-item">
        <img src="shot2.jpg" alt="Gallery Image">
        <div class="photo-label">IMG_REF_002</div>
    </div>
    <div class="photo-item">
        <img src="shot3.jpg" alt="Gallery Image">
        <div class="photo-label">IMG_REF_003</div>
    </div>
    <div class="photo-item">
        <img src="shot4.jpg" alt="Gallery Image">
        <div class="photo-label">IMG_REF_004</div>
    </div>
</div>

</body>
</html>
