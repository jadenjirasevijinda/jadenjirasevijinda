<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery — Jaden Jirasevijinda</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="nav.js" defer></script>
  <style>
    html, body { overflow: hidden; }

    .page-shell {
      height: 100vh; width: 100vw;
      display: grid;
      grid-template-columns: 300px 1fr;
      padding-top: var(--nav-h);
      position: relative; z-index: 1;
    }

    .gallery-left {
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 44px 32px 44px 48px;
      border-right: 1px solid var(--line);
      animation: up .5s .05s ease both;
    }

    .page-eyebrow { font-size: 11px; font-weight: 500; color: var(--sub); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 20px; }
    .page-heading { font-size: clamp(2.4rem, 4vw, 4.2rem); font-weight: 800; letter-spacing: -.04em; line-height: .9; text-transform: uppercase; margin-bottom: 24px; }
    .page-heading .ac { color: var(--accent); }

    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-label { font-size: 10px; font-weight: 700; color: var(--sub); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
    .filter-btn { background: var(--s1); border: 1px solid var(--line); border-radius: 10px; padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--sub); cursor: pointer; font-family: inherit; letter-spacing: .02em; text-align: left; transition: color .2s, border-color .2s, background .2s; }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { color: var(--accent); border-color: rgba(42,143,163,.35); background: rgba(42,143,163,.07); }

    .gallery-count { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 13px; color: var(--sub); }

    .gallery-right { overflow-y: auto; padding: 32px 28px; animation: up .5s .15s ease both; }

    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(460px, 1fr)); gap: 24px; }

    .media-item { background: var(--s1); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; transition: border-color .2s, transform .2s; }
    .media-item:hover { border-color: rgba(42,143,163,.35); transform: translateY(-3px); }
    .media-item.hidden { display: none; }

    .media-item iframe,
    .media-item img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; border: none; }

    .media-meta { padding: 12px 14px; border-top: 1px solid var(--line); }
    .media-title { font-size: 13px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 3px; }
    .media-type { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }

    @media (max-width: 960px) {
      html, body { overflow: auto; }
      .page-shell { grid-template-columns: 1fr; height: auto; }
      .gallery-left { border-right: none; border-bottom: 1px solid var(--line); padding: 36px 24px; }
      .filter-group { flex-direction: row; flex-wrap: wrap; }
      .gallery-right { padding: 20px; }
      .media-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="dot-canvas"></canvas>
  <div class="glow"></div>

  <nav></nav>

  <div class="page-shell">
    <div class="gallery-left">
      <div>
        <div class="page-eyebrow">04 — Gallery</div>
        <h1 class="page-heading">MY<br><span class="ac">GALLERY.</span></h1>
      </div>
      <div>
        <div class="filter-group">
          <div class="filter-label">Filter</div>
          <button class="filter-btn active" onclick="filter('all', this)">All</button>
          <button class="filter-btn" onclick="filter('video', this)">Videos</button>
          <button class="filter-btn" onclick="filter('photo', this)">Photos</button>
        </div>
      </div>
      <div class="gallery-count" id="gallery-count">5 items</div>
    </div>

    <div class="gallery-right">
      <div class="media-grid" id="media-grid">

        <div class="media-item is-video" data-type="video">
          <iframe src="https://www.youtube.com/embed/-Zo48A-v5tM" allowfullscreen loading="lazy"></iframe>
          <div class="media-meta">
            <div class="media-title">The Math Genius Who Changed Calculus</div>
            <div class="media-type">YouTube</div>
          </div>
        </div>

        <div class="media-item is-video" data-type="video">
          <iframe src="https://www.youtube.com/embed/i2x2A8O9adQ" allowfullscreen loading="lazy"></iframe>
          <div class="media-meta">
            <div class="media-title">How The Great Gatsby Turns Dreams Into Destruction</div>
            <div class="media-type">YouTube</div>
          </div>
        </div>

        <div class="media-item is-video" data-type="video">
          <iframe src="https://www.youtube.com/embed/tRyBXCNcafs" allowfullscreen loading="lazy"></iframe>
          <div class="media-meta">
            <div class="media-title">Catcher in the Rye Summary</div>
            <div class="media-type">YouTube</div>
          </div>
        </div>

        <div class="media-item is-video" data-type="video">
          <iframe src="https://www.youtube.com/embed/7uEp4WgjlUM" allowfullscreen loading="lazy"></iframe>
          <div class="media-meta">
            <div class="media-title">Earth Day Timelapse</div>
            <div class="media-type">YouTube</div>
          </div>
        </div>

        <div class="media-item" data-type="photo">
          <img src="media/shot1.jpg" alt="Photo"/>
          <div class="media-meta">
            <div class="media-title">Photography</div>
            <div class="media-type">Photo</div>
          </div>
        </div>

        <div class="media-item is-video" data-type="video">
          <iframe src="https://www.youtube.com/embed/eAQyTXG20Bk" allowfullscreen loading="lazy"></iframe>
          <div class="media-meta">
            <div class="media-title">The Great Gatsby Radio Project</div>
            <div class="media-type">YouTube</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="portfolio.js"></script>
  <script>
    function filter(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const items = document.querySelectorAll('.media-item');
      let count = 0;
      items.forEach(item => {
        const match = type === 'all' || item.dataset.type === type;
        item.classList.toggle('hidden', !match);
        if (match) count++;
      });
      document.getElementById('gallery-count').textContent = count + ' item' + (count !== 1 ? 's' : '');
    }
    document.getElementById('gallery-count').textContent =
      document.querySelectorAll('.media-item').length + ' items';
  </script>
</body>
</html>
