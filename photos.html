<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERY // JADEN_J</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0b; --accent: #ff5d22; --border: #222224; --nav-h: 70px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk'; padding-top: var(--nav-h); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* BACKGROUND EFFECTS */
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(var(--border) 1px, transparent 0); background-size: 40px 40px; z-index: -1; }
        .spotlight { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(500px circle at var(--x) var(--y), rgba(255,93,34,0.06), transparent 40%); z-index: -1; pointer-events: none; }

        /* NAVIGATION */
        nav { position: fixed; top: 0; width: 100%; height: var(--nav-h); background: rgba(10,10,11,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000; }
        .nav-logo { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 13px; font-weight: 700; }
        .nav-links a { font-family: 'JetBrains Mono'; color: #666; text-decoration: none; font-size: 11px; margin-left: 25px; transition: 0.3s; }
        .nav-links a.active { color: var(--accent); }
        
        /* HEADER & FILTER */
        .header { padding: 60px 40px 20px; }
        .filter-bar { padding: 0 40px 30px; display: flex; gap: 20px; }
        .filter-btn { 
            background: none; border: 1px solid var(--border); color: #666; 
            font-family: 'JetBrains Mono'; font-size: 10px; padding: 8px 16px; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .filter-btn:hover { color: #fff; border-color: #444; }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); }

        /* GALLERY GRID */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; padding: 0 40px 40px; flex-grow: 1; }
        
        .photo-item { 
            width: 100%; aspect-ratio: 1/1; background: #111; border: 1px solid var(--border); 
            overflow: hidden; position: relative; cursor: crosshair;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }
        .photo-item img, .photo-item video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; filter: grayscale(1); }
        .photo-item:hover img, .photo-item:hover video { opacity: 1; transform: scale(1.05); filter: grayscale(0); }
        
        /* Hidden state for filtered items */
        .photo-item.hidden { display: none; }

        .sys-footer { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 25px 40px; font-family: 'JetBrains Mono'; background: #000; border-top: 1px solid var(--border); }
        .f-label { color: #444; font-size: 9px; } .f-data { color: var(--accent); font-size: 10px; margin-left: 8px; }
    </style>
</head>
<body onmousemove="document.documentElement.style.setProperty('--x', event.clientX + 'px'); document.documentElement.style.setProperty('--y', event.clientY + 'px')">

<div class="grid-overlay"></div>
<div class="spotlight"></div>

<nav>
    <div class="nav-logo">JADEN_JIRASEVIJINDA.SYS</div>
    <div class="nav-links">
        <a href="index.html">01_HOME</a>
        <a href="about.html">02_ABOUT</a>
        <a href="projects.html">03_WORKS</a>
        <a href="photos.html" class="active">04_GALLERY</a>
        <a href="contact.html">05_CONNECT</a>
    </div>
</nav>

<div class="header">
    <span style="font-family:'JetBrains Mono'; color:var(--accent); font-size:11px;">[ FILE_04: MEDIA_GALLERY ]</span>
    <h1 style="font-size: 3.5rem; text-transform: uppercase; margin-top: 10px;">Visual <span style="color:var(--accent)">Capture.</span></h1>
</div>

<div class="filter-bar">
    <button class="filter-btn active" onclick="filterMedia('all')">// ALL_MEDIA</button>
    <button class="filter-btn" onclick="filterMedia('photo')">// PHOTOS</button>
    <button class="filter-btn" onclick="filterMedia('video')">// VIDEOS</button>
</div>

<div class="photo-grid" id="media-grid">
    <div class="photo-item" data-type="photo">
        <img src="shot1.jpg" alt="Photography">
    </div>

    <div class="photo-item" data-type="video">
        <video src="edit1.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
    </div>

    <div class="photo-item" data-type="photo">
        <img src="shot2.jpg" alt="Photography">
    </div>

    <div class="photo-item" data-type="video">
        <video src="edit2.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
    </div>
</div>

<footer class="sys-footer">
    <div><span class="f-label">LOC //</span><span class="f-data">LIVERMORE_CA</span></div>
    <div style="text-align: center;"><span class="f-label">SYS_TIME //</span><span id="clock" class="f-data">00:00:00</span></div>
    <div style="text-align: right;"><span class="f-label">VER //</span><span class="f-data">4.2.0</span></div>
</footer>

<script>
    // FILTER LOGIC
    function filterMedia(type) {
        // Update Buttons
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Filter Grid
        const items = document.querySelectorAll('.photo-item');
        items.forEach(item => {
            if (type === 'all' || item.getAttribute('data-type') === type) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    }

    // System Clock
    function tick() {
        const now = new Date();
        document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
    }
    setInterval(tick, 1000); tick();
</script>
</body>
</html>
